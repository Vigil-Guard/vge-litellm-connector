name: vge-litellm

services:
  vge-litellm-adapter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vge-litellm-adapter
    restart: unless-stopped
    # Internal only for single-host compose reference setup.
    # For multi-host deployment publish via controlled ingress/firewall.
    expose:
      - '8081'
    environment:
      ADAPTER_PORT: '8081'
      VIGIL_API_URL: ${VIGIL_API_URL:?VIGIL_API_URL is required (HTTPS endpoint)}
      VIGIL_API_KEY: ${VIGIL_API_KEY:?VIGIL_API_KEY is required}
      VIGIL_TIMEOUT_MS: ${VIGIL_TIMEOUT_MS:-3000}
      ADAPTER_FAIL_MODE: ${ADAPTER_FAIL_MODE:-closed}
      ADAPTER_INBOUND_BEARER_TOKEN: ${ADAPTER_INBOUND_BEARER_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      # For self-signed / internal CA environments, set NODE_EXTRA_CA_CERTS
      # or NODE_TLS_REJECT_UNAUTHORIZED=0 (dev only) in .env
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-}
    # Map VGE hostname to Docker host when VGE runs on the same machine.
    # Remove or adjust for production where DNS resolves natively.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
      - '${VGE_DOCKER_HOST:-api.vigilguard}:host-gateway'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - litellm-internal
    healthcheck:
      interval: 15s
      timeout: 3s
      start_period: 5s
      retries: 3
      test:
        [
          'CMD',
          'node',
          '-e',
          'const r=require("http").get("http://localhost:8081/health/live",s=>{s.resume();process.exit(s.statusCode===200?0:1)});r.on("error",()=>process.exit(1))',
        ]

  litellm-proxy:
    # main-stable tracks latest stable release. Pin to a specific tag
    # (e.g. v1.81.9) if you need reproducible builds.
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-proxy
    restart: unless-stopped
    ports:
      - '4000:4000'
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: ['--config', '/app/config.yaml', '--port', '4000', '--detailed_debug']
    depends_on:
      vge-litellm-adapter:
        condition: service_healthy
    networks:
      - litellm-internal

networks:
  litellm-internal:
    driver: bridge
