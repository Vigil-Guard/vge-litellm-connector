model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

# Root-level guardrails key (v2 format, required for LiteLLM >= v1.65).
# The old litellm_settings.guardrails path triggers the v1 parser which
# expects a different schema and will crash on generic_guardrail_api configs.
guardrails:
  - guardrail_name: vigil-guard
    litellm_params:
      guardrail: generic_guardrail_api
      mode: [pre_call, post_call]
      api_base: http://vge-litellm-adapter:8081
      default_on: true
