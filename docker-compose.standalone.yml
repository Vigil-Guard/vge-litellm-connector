# Standalone override - use when Vigil Guard is remote (no local VGE stack).
# Usage: docker compose -f docker-compose.yml -f docker-compose.standalone.yml up -d
services:
  vigil-litellm-adapter:
    environment:
      VIGIL_API_URL: ${VIGIL_API_URL:?Set VIGIL_API_URL to remote Vigil Guard API}
    networks:
      - litellm-internal

networks:
  vigil-public:
    external: false
    name: vigil-litellm-local
